name: 收灵魂（表单进村）
on:
  issues:
    types: [opened, labeled]
permissions: { contents: write, pull-requests: write, issues: write }
jobs:
  intake:
    if: contains(github.event.issue.labels.*.name, 'open-souls')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml
      - name: 表单 → JSON
        env:
          BODY: ${{ github.event.issue.body }}
        run: |
          python - << 'PY'
          import os, re, json
          body = os.environ["BODY"]
          M = {"角色名":"name","一句话":"one_line","想要什么":"drives",
               "裂缝·嘴上说":"says","裂缝·实际做":"does","被逼到墙角会怎样":"under_pressure",
               "说话方式":"voice","背景":"backstory","边界":"boundaries"}
          out, secs = {}, re.split(r"\n###\s+", "\n"+body)
          for s in secs:
              if "\n" not in s: continue
              head, val = s.split("\n",1)
              head, val = head.strip(), val.strip()
              for k,v in M.items():
                  if head.startswith(k): out[v]=val
          json.dump(out, open("/tmp/submission.json","w"), ensure_ascii=False)
          print(out)
          PY
      - run: python engine/intake.py /tmp/submission.json
      - name: 开 PR
        env: { GH_TOKEN: ${{ github.token }} }
        run: |
          NAME=$(python -c "import json;print(json.load(open('/tmp/submission.json'))['name'])")
          BR="join/issue-${{ github.event.issue.number }}"
          git config user.name "村口"; git config user.email "gate@village.local"
          git checkout -b "$BR"
          git add souls
          git commit -m "新灵魂进村：$NAME（#${{ github.event.issue.number }}）"
          git push -u origin "$BR"
          gh pr create --fill --base main --head "$BR" \
            --title "[进村] $NAME" \
            --body "来自表单 #${{ github.event.issue.number }}。CI 验过即可合，下一回续写 ta 优先登场。closes #${{ github.event.issue.number }}"
